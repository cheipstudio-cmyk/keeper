name: Release APK and AAB

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.13

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.13 --distribution-type all
          fi
          chmod +x gradlew

      - name: Decode keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > $GITHUB_WORKSPACE/keeper-upload-key.jks
          ls -la $GITHUB_WORKSPACE/keeper-upload-key.jks

      - name: Build release APK and AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keeper-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Locate output artifacts
        id: locate
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          AAB=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "aab=$AAB" >> $GITHUB_OUTPUT
          echo "APK: $APK"
          echo "AAB: $AAB"

      - name: Rename artifacts with version tag
        id: rename
        run: |
          TAG=${GITHUB_REF_NAME}
          mkdir -p release-output
          cp "${{ steps.locate.outputs.apk }}" "release-output/keeper-${TAG}.apk"
          cp "${{ steps.locate.outputs.aab }}" "release-output/keeper-${TAG}.aab"
          ls -la release-output
          echo "apk_renamed=release-output/keeper-${TAG}.apk" >> $GITHUB_OUTPUT
          echo "aab_renamed=release-output/keeper-${TAG}.aab" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Keeper ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.rename.outputs.apk_renamed }}
            ${{ steps.rename.outputs.aab_renamed }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f $GITHUB_WORKSPACE/keeper-upload-key.jks
